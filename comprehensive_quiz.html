<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMT-P 臨床胸部創傷與急症綜合模擬檢定 | 決策訓練系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #131b2e;
            --bg-tertiary: #1e293b;
            --accent-red: #ef4444;
            --accent-red-hover: #dc2626;
            --accent-blue: #3b82f6;
            --accent-orange: #f97316;
            --accent-yellow: #f59e0b;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --font-main: 'Inter', 'Noto Sans TC', sans-serif;
            --font-header: 'Outfit', 'Noto Sans TC', sans-serif;
            --transition-speed: 0.3s;
            --glow-blue: 0 0 15px rgba(59, 130, 246, 0.4);
            --glow-red: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-main);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 41, 59, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(15, 23, 42, 0.4) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #0f172a 0%, var(--bg-secondary) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-badge {
            background-color: var(--accent-blue);
            color: white;
            font-family: var(--font-header);
            font-weight: 800;
            font-size: 0.8rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: var(--glow-blue);
        }

        h1 {
            font-family: var(--font-header);
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition-speed);
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-blue);
        }

        main {
            max-width: 1000px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 1.5rem;
            flex: 1;
        }

        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .card-title {
            font-family: var(--font-header);
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            border-left: 4px solid var(--accent-blue);
            padding-left: 0.75rem;
            color: var(--text-primary);
        }

        /* Progress Steps */
        .progress-bar-container {
            margin-bottom: 2rem;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .progress-track {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            width: 0%;
            transition: width var(--transition-speed);
        }

        /* Case Box */
        .case-box {
            background: #090d16;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .case-tag {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 0.75rem;
            letter-spacing: 0.5px;
        }

        .case-description {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-primary);
        }

        /* Actions Grid */
        .actions-section-title {
            font-size: 0.95rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        @media (min-width: 576px) {
            .actions-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .action-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 1rem 0.75rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all var(--transition-speed);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent-blue);
            box-shadow: var(--glow-blue);
        }

        .action-btn.performed {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .action-icon {
            font-size: 1.5rem;
        }

        /* Findings Display */
        .finding-card {
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 2rem;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .finding-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--accent-blue);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .finding-content {
            font-size: 1rem;
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Diagnosis Panel */
        .diagnosis-section {
            border-top: 1px solid var(--border-color);
            padding-top: 2rem;
            display: none;
        }

        .diagnosis-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        @media (min-width: 768px) {
            .diagnosis-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .diag-option {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1.25rem;
            cursor: pointer;
            transition: all var(--transition-speed);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-primary);
            text-align: left;
        }

        .diag-option:hover {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.25);
            transform: translateY(-2px);
        }

        .diag-circle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all var(--transition-speed);
        }

        .diag-option.selected {
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--accent-purple);
        }

        .diag-option.selected .diag-circle {
            border-color: var(--accent-purple);
            background: var(--accent-purple);
            box-shadow: 0 0 8px var(--accent-purple);
        }

        .diag-option.correct {
            background: rgba(16, 185, 129, 0.15) !important;
            border-color: var(--accent-green) !important;
        }

        .diag-option.correct .diag-circle {
            border-color: var(--accent-green) !important;
            background: var(--accent-green) !important;
        }

        .diag-option.wrong {
            background: rgba(239, 68, 68, 0.15) !important;
            border-color: var(--accent-red) !important;
        }

        .diag-option.wrong .diag-circle {
            border-color: var(--accent-red) !important;
            background: var(--accent-red) !important;
        }

        /* Feedback Area */
        .feedback-box {
            background: #0f1626;
            border-left: 4px solid var(--accent-blue);
            border-radius: 0 12px 12px 0;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .feedback-status {
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .feedback-status.correct {
            color: var(--accent-green);
        }

        .feedback-status.wrong {
            color: var(--accent-red);
        }

        .feedback-text {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        /* Buttons Control */
        .control-btns {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0.75rem 1.75rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all var(--transition-speed);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            cursor: not-allowed;
            border: 1px solid var(--border-color);
        }

        .btn-purple {
            background: var(--accent-purple);
        }

        /* Final Screen */
        .final-panel {
            display: none;
            text-align: center;
            padding: 3rem 1rem;
            animation: fadeIn 0.5s ease;
        }

        .score-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 8px solid var(--bg-tertiary);
            border-top-color: var(--accent-blue);
            margin: 0 auto 2rem auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: var(--font-header);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .score-num {
            font-size: 3.5rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }

        .score-lbl {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.25rem;
        }

        .performance-feedback {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--accent-green);
        }

        .performance-desc {
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto 2.5rem auto;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            text-align: center;
            padding: 2.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
            background-color: rgba(11, 15, 25, 0.8);
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-badge">EMT-P EXAM</span>
                <h1>臨床胸部創傷與急症綜合模擬檢定</h1>
            </div>
            <a href="./index.html" class="btn-back">⬅ 返回儀表板</a>
        </div>
    </header>

    <main>
        <!-- Quiz Play Panel -->
        <div class="card" id="quiz-play-panel">
            <!-- Progress Steps -->
            <div class="progress-bar-container">
                <div class="progress-info">
                    <span id="case-counter-lbl">案例載入中...</span>
                    <span id="score-counter-lbl">得分: 0 分</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <!-- Case Scenario Box -->
            <div class="case-box">
                <span class="case-tag">緊急臨床案例</span>
                <div class="case-description" id="case-desc">
                    正在載入臨床案件...
                </div>
            </div>

            <!-- Action Section -->
            <div class="actions-section-title">
                <span>選擇評估檢查項目 (建議執行 3 項以上以確定臨床診斷)</span>
                <span id="actions-counter" style="color: var(--accent-yellow);">已執行檢查: 0 / 3</span>
            </div>

            <!-- Actions Buttons -->
            <div class="actions-grid" id="actions-grid">
                <button class="action-btn" onclick="performExamination('vitals')">
                    <span class="action-icon">📊</span>
                    <span>生命徵象 (Vitals)</span>
                </button>
                <button class="action-btn" onclick="performExamination('look')">
                    <span class="action-icon">👀</span>
                    <span>視診 (Look)</span>
                </button>
                <button class="action-btn" onclick="performExamination('listen')">
                    <span class="action-icon">👂</span>
                    <span>聽診 (Listen)</span>
                </button>
                <button class="action-btn" onclick="performExamination('feel')">
                    <span class="action-icon">✋</span>
                    <span>觸診 (Feel)</span>
                </button>
                <button class="action-btn" onclick="performExamination('percuss')">
                    <span class="action-icon">🥁</span>
                    <span>叩診 (Percuss)</span>
                </button>
                <button class="action-btn" onclick="performExamination('us')">
                    <span class="action-icon">📟</span>
                    <span>e-FAST 超音波</span>
                </button>
                <button class="action-btn" onclick="performExamination('ecg')">
                    <span class="action-icon">📈</span>
                    <span>心電圖 (ECG)</span>
                </button>
                <button class="action-btn" onclick="performExamination('xray')">
                    <span class="action-icon">🩻</span>
                    <span>胸部 X 光</span>
                </button>
            </div>

            <!-- Findings Card -->
            <div class="finding-card" id="finding-card">
                <div class="finding-title" id="finding-title">
                    <span>🔍 檢查報告</span>
                </div>
                <div class="finding-content" id="finding-content">
                    檢查結果顯示於此...
                </div>
            </div>

            <!-- Diagnosis Panel (visible after doing checks) -->
            <div class="diagnosis-section" id="diagnosis-section">
                <h3 style="font-family: var(--font-header); margin-bottom: 1.25rem; font-size: 1.15rem; color: var(--accent-purple);">
                    🚨 請做出您的臨床診斷：
                </h3>
                <div class="diagnosis-grid" id="diagnosis-grid">
                    <!-- Options dynamically loaded -->
                </div>
            </div>

            <!-- Feedback Box -->
            <div class="feedback-box" id="feedback-box">
                <div class="feedback-status" id="feedback-status">評估結果</div>
                <div class="feedback-text" id="feedback-text">
                    診斷回饋內容...
                </div>
            </div>

            <!-- Bottom Control Button -->
            <div class="control-btns">
                <button class="btn btn-purple" id="btn-submit-diag" onclick="submitDiagnosis()" disabled>做出診斷 ➔</button>
                <button class="btn" id="btn-next-case" onclick="nextCase()" style="display:none;">下一個案例 ➔</button>
            </div>
        </div>

        <!-- Quiz Final Panel -->
        <div class="card final-panel" id="quiz-final-panel">
            <h2 style="font-family: var(--font-header); font-size: 2.2rem; margin-bottom: 1.5rem;">檢定測驗完成</h2>
            <div class="score-circle">
                <span class="score-num" id="final-score-num">0</span>
                <span class="score-lbl">得分</span>
            </div>
            <div class="performance-feedback" id="performance-feedback">優異的處置表現！</div>
            <div class="performance-desc" id="performance-desc">
                您對各種創傷病理及心舒張填塞、氣胸的臨床細節掌握非常扎實。
            </div>
            <button class="btn" onclick="restartQuiz()">重新挑戰測驗</button>
        </div>
    </main>

    <footer>
        <p>© 2026 EMT-P 臨床模擬教學系統 - 綜合緊急處置挑戰</p>
    </footer>

    <script>
        // Quiz Data - 6 Cases mapping to the 6 modules
        const allCases = [
            {
                id: 'tension_pneumothorax',
                title: '案例 A',
                desc: '一位 28 歲男性在街頭鬥毆中右胸遭受尖刀刺傷。現場評估見病人極度呼吸困難、發紺、躁動不安且大汗淋漓。如果您是現場的 EMT-P，應如何逐步評估並找出病因？',
                exams: {
                    vitals: '生命徵象：血壓 82/50 mmHg（低血壓，脈壓差窄），心跳 135 bpm（竇性心搏過速），呼吸 34 bpm（急促淺快），SpO2 78%（嚴重低血氧）。',
                    look: '視診：右側胸壁有小穿透傷口但無空氣逸出聲，右胸起伏顯著減弱；雙側頸靜脈極度怒張；氣管明顯偏向健側（左側）。',
                    listen: '聽診：右肺呼吸音完全消失，左肺呼吸音清晰。心音正常但因喘息聲顯得雜亂。',
                    feel: '觸診：右側頸部可摸到輕微皮下氣腫（握雪感）；橈動脈搏動極其微弱。',
                    percuss: '叩診：右胸叩診呈強烈鼓音（Hyperresonance），左胸叩診為正常的清音（Resonance）。',
                    us: 'e-FAST超音波：右肺前胸切面掃描見肺滑動（Lung Sliding）完全消失，呈現 Barcode Sign（條碼徵，亦稱 Seashore sign 消失）；左肺前胸掃描見正常的砂灘徵（Seashore Sign）。未見心包膜積液。',
                    ecg: '心電圖：竇性心搏過速 (Sinus Tachycardia)，心率 135 bpm，無缺血性變化。',
                    xray: '胸部X光：右側肋膜腔大量積氣、右肺葉完全塌陷萎縮；縱膈腔與氣管偏向左側；右側橫膈膜高度被壓扁平坦（典型張力性氣胸表徵）。'
                },
                diagnosis: 'tension_pneumothorax',
                diagName: '張力性氣胸 (Tension Pneumothorax)',
                feedback: '【正確診斷：張力性氣胸】\n這是一位典型的右側張力性氣胸病患。診斷要點為：單側呼吸音消失（右側）+ 叩診鼓音 + 頸靜脈怒張 + 收縮壓 < 90 mmHg（梗塞性休克表現）。超音波檢查呈現 Barcode Sign（肺滑動消失）能快速確診。此時應立即執行右側針刺減壓或指尖造口術，以挽救生命，否則病患將迅速惡化為 PEA 死亡螺旋。'
            },
            {
                id: 'cardiac_tamponade',
                title: '案例 B',
                desc: '一位 42 歲女性在槍擊案中胸部正中央（胸骨區）遭子彈擊中。救護車抵達時，患者面色蒼白、冷汗直流，且意識狀態呈混亂模糊狀態。請進行理學檢查以判斷主要致命傷。',
                exams: {
                    vitals: '生命徵象：血壓 75/55 mmHg（嚴重低血壓且脈壓差極窄），心跳 122 bpm（弱），呼吸 28 bpm，SpO2 90%（經鼻導管給氧下）。',

        // Shuffle function
        function shuffleArray(array) {
            let cur = array.slice();
            for (let i = cur.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cur[i], cur[j]] = [cur[j], cur[i]];
            }
            return cur;
        }

        // Initial setup
        function initQuiz() {
            // Select 3 random cases from all 6 available
            quizCases = shuffleArray(allCases).slice(0, 3);
            currentCaseIndex = 0;
            score = 0;
            loadCase();
        }

        function loadCase() {
            const currentCase = quizCases[currentCaseIndex];
            currentCasePerformedChecks = [];
            currentSelectedDiagnosis = '';
            hasCheckedThisTurn = false;

            // Update Header labels
            document.getElementById('case-counter-lbl').textContent = `案例挑戰: 第 ${currentCaseIndex + 1} / 3 案`;
            document.getElementById('score-counter-lbl').textContent = `累計得分: ${score} 分`;
            
            // Progress Fill
            const progressPct = (currentCaseIndex / 3) * 100;
            document.getElementById('progress-fill').style.width = `${progressPct}%`;

            // Reset action buttons states
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.classList.remove('performed');
                btn.disabled = false;
            });

            // Update Case description
            document.getElementById('case-desc').textContent = currentCase.desc;
            
            // Hide findings and feedback cards
            document.getElementById('finding-card').style.display = 'none';
            document.getElementById('feedback-box').style.display = 'none';
            document.getElementById('diagnosis-section').style.display = 'none';
            
            // Disable diagnosis buttons
            document.getElementById('btn-submit-diag').disabled = true;
            document.getElementById('btn-submit-diag').style.display = 'inline-flex';

            // Update action count label
            updateActionCountLabel();

            // Load Diagnosis options
            loadDiagnosisOptions();

        function updateActionCountLabel() {
            const count = currentCasePerformedChecks.length;
            const label = document.getElementById('actions-counter');
            label.textContent = `已執行檢查: ${count} / 3`;
            if (count >= 3) {
                label.style.color = '#10b981'; // Green
            } else {
                label.style.color = '#f59e0b'; // Yellow
            }
        }

            const grid = document.getElementById('diagnosis-grid');
            grid.innerHTML = '';
            
            // All 6 options
            const options = [
                { id: 'tension_pneumothorax', name: '張力性氣胸 (Tension Pneumothorax)' },
                { id: 'open_pneumothorax', name: '開放性氣胸 (Open Pneumothorax)' },
                { id: 'massive_hemothorax', name: '大量血胸 (Massive Hemothorax)' },
                { id: 'cardiac_tamponade', name: '心包膜填塞 (Cardiac Tamponade)' },
                { id: 'pulmonary_embolism', name: '急性肺栓塞 (Pulmonary Embolism)' },
                { id: 'tracheobronchial_rupture', name: '氣管支氣管破裂 (Tracheobronchial Rupture)' }
            ];

            options.forEach(opt => {
                const button = document.createElement('button');
                button.className = 'diag-option';
                button.id = `diag-opt-${opt.id}`;
                button.onclick = () => selectDiagnosis(opt.id);
                button.innerHTML = `
                    <div class="diag-circle"></div>
                    <span>${opt.name}</span>
                `;
                grid.appendChild(button);
            });
        }

            if (hasCheckedThisTurn) return; // Frozen after submitting diagnosis

            const currentCase = quizCases[currentCaseIndex];
            const resultText = currentCase.exams[examType];
            
            // Add to performed check array if not already present
            if (!currentCasePerformedChecks.includes(examType)) {
                currentCasePerformedChecks.push(examType);
            }

            // Find button element and add class
            const btns = document.querySelectorAll('.action-btn');
            const icons = {
                vitals: '📊', look: '👀', listen: '👂', feel: '✋', percuss: '🥁', us: '📟', ecg: '📈', xray: '🩻'
            };
            
            // Highlight current button
            document.querySelectorAll('.action-btn').forEach(btn => {
                if (btn.querySelector('span:last-child').textContent.includes(examType === 'vitals' ? '生命徵象' :

                                                                             examType === 'listen' ? '聽診' : 
                                                                             examType === 'feel' ? '觸診' : 
                                                                             examType === 'percuss' ? '叩診' : 
                                                                             examType === 'us' ? '超音波' : 
                                                                             examType === 'ecg' ? '心電圖' : 'X 光')) {
                    btn.classList.add('performed');
                }
            });

            // Display finding
            const titles = {
                vitals: '📊 生命徵象報告',
                look: '👀 視診評估發現',

            document.getElementById('finding-card').style.display = 'block';

            // Update checks count
            updateActionCountLabel();

            // Show Diagnosis section if >= 3 checks performed
            if (currentCasePerformedChecks.length >= 3) {
                document.getElementById('diagnosis-section').style.display = 'block';

                document.getElementById('diagnosis-section').scrollIntoView({ behavior: 'smooth' });

        function selectDiagnosis(diagId) {
            if (hasCheckedThisTurn) return; // Frozen after submitting diagnosis

            currentSelectedDiagnosis = diagId;
            
            // Highlight selected option
            document.querySelectorAll('.diag-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            document.getElementById(`diag-opt-${diagId}`).classList.add('selected');

            // Enable submit button
            document.getElementById('btn-submit-diag').disabled = false;
        }

        function submitDiagnosis() {
            if (currentSelectedDiagnosis === '') return;

            hasCheckedThisTurn = true;
            const currentCase = quizCases[currentCaseIndex];
            const isCorrect = (currentSelectedDiagnosis === currentCase.diagnosis);
            
            // Disable all action and diag options buttons
            document.querySelectorAll('.action-btn').forEach(btn => btn.disabled = true);
            document.querySelectorAll('.diag-option').forEach(btn => {
                // remove click pointer cursors
                btn.style.cursor = 'default';
            });

            // Highlight Correct and Wrong options
            if (isCorrect) {
                document.getElementById(`diag-opt-${currentSelectedDiagnosis}`).classList.add('correct');
                score += 10; // 10 points per case
                showFeedback(true, currentCase.feedback);
            } else {
                document.getElementById(`diag-opt-${currentSelectedDiagnosis}`).classList.add('wrong');
                document.getElementById(`diag-opt-${currentCase.diagnosis}`).classList.add('correct');
                showFeedback(false, currentCase.feedback);
            }

            // Update Score counter
            document.getElementById('score-counter-lbl').textContent = `累計得分: ${score} 分`;

            // Adjust controls display
            document.getElementById('btn-submit-diag').style.display = 'none';
            document.getElementById('btn-next-case').style.display = 'inline-flex';
        }

        function showFeedback(isCorrect, text) {
            const feedbackBox = document.getElementById('feedback-box');
            const status = document.getElementById('feedback-status');
            const desc = document.getElementById('feedback-text');

            if (isCorrect) {
                status.textContent = '✓ 診斷正確！臨床決策無誤 (+10分)';
                status.className = 'feedback-status correct';
                feedbackBox.style.borderLeftColor = 'var(--accent-green)';
            } else {
                status.textContent = '❌ 診斷有誤！臨床推理需要再加強';
                status.className = 'feedback-status wrong';
                feedbackBox.style.borderLeftColor = 'var(--accent-red)';
            }

            desc.innerHTML = text.replace(/\n/g, '<br>');
            feedbackBox.style.display = 'block';
            feedbackBox.scrollIntoView({ behavior: 'smooth' });
        }

        function nextCase() {
            currentCaseIndex++;
            if (currentCaseIndex < 3) {
                loadCase();
            } else {
                showFinalScore();
            }
        }

        function showFinalScore() {
            // Update progress bar to 100%
            document.getElementById('progress-fill').style.width = '100%';

            // Hide play panel and show final panel
            document.getElementById('quiz-play-panel').style.display = 'none';
            const finalPanel = document.getElementById('quiz-final-panel');
            finalPanel.style.display = 'block';
            
            // Set score
            document.getElementById('final-score-num').textContent = score;

            // Set custom feedback based on score
            const fbTitle = document.getElementById('performance-feedback');
            const fbDesc = document.getElementById('performance-desc');

            if (score === 30) {
                fbTitle.textContent = '🌟 完美滿分！高級救護技術員 (EMT-P) 導師級水準';
                fbTitle.style.color = 'var(--accent-green)';
                fbDesc.textContent = '您成功識破了所有複雜的創傷臨床案例！對貝克氏三徵、針刺減壓條件、大量血胸的實音判定以及氣管支氣管破裂等極高難度診斷的判讀完美無瑕，能給予病患最即時精準的救治決策！';
            } else if (score === 20) {
                fbTitle.textContent = '👏 表現優異！具備扎實的臨床判斷能力';
                fbTitle.style.color = 'var(--accent-blue)';
                fbDesc.textContent = '您答對了多數案例！展現了良好的創傷理學評估邏輯。再細心複習一下答錯的案例，注意區分不同休克分類（如失血性休克與梗塞性休克）以及超音波特徵，您一定能更上一層樓！';
            } else {
                fbTitle.textContent = '📚 還需加油！多複習各症狀學理與病理機轉';
                fbTitle.style.color = 'var(--accent-yellow)';
                fbDesc.textContent = '本次測驗得分較低。建議您回到六個核心症狀的學習網頁，點選裡面的「學理導讀」與「病理模擬」再次複習，特別注意頸靜脈怒張、呼吸音變化以及 e-FAST 超音波影像的診斷差異。';
            }
            finalPanel.scrollIntoView({ behavior: 'smooth' });
        }

        function restartQuiz() {
            document.getElementById('quiz-final-panel').style.display = 'none';
            document.getElementById('quiz-play-panel').style.display = 'block';
            initQuiz();
        }

        // Initialize quiz on page load
        window.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
